<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flutter 开发者作品矩阵</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --flutter-blue: #02569B;
            --flutter-cyan: #13B9FD;
            --border: #334155;
            --accent-green: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-main); color: var(--text-main); line-height: 1.6; padding: 60px 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 50px; }
        .logo-hub { width: 70px; height: 70px; background: linear-gradient(135deg, var(--flutter-blue), var(--flutter-cyan)); border-radius: 18px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(19, 185, 253, 0.3); }
        header h1 { font-size: 36px; font-weight: 800; margin-bottom: 12px; background: linear-gradient(to right, #ffffff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { color: var(--text-muted); font-size: 16px; margin-bottom: 20px; }
        .stats-bar { display: inline-flex; gap: 15px; background: rgba(30, 41, 59, 0.7); padding: 8px 18px; border-radius: 30px; border: 1px solid var(--border); font-size: 13px; }
        .stats-item { display: flex; align-items: center; gap: 6px; color: var(--text-muted); }
        .stats-item strong { color: var(--flutter-cyan); }
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-top: 20px; }
        .project-card { background-color: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; display: flex; flex-direction: column; transition: all 0.3s ease; }
        .project-card:hover { transform: translateY(-5px); border-color: var(--flutter-cyan); box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
        .app-icon-wrapper { width: 48px; height: 48px; background: rgba(51, 65, 85, 0.5); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--flutter-cyan); }
        .version-badge { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; border: 1px solid rgba(16, 185, 129, 0.3); }
        .project-card h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #ffffff; }
        .project-desc { font-size: 14px; color: var(--text-muted); min-height: 44px; margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: auto; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; text-decoration: none; }
        .btn-web { background-color: rgba(51, 65, 85, 0.8); color: #ffffff; border: 1px solid var(--border); }
        .btn-web:hover { background-color: rgba(71, 85, 105, 1); }
        .btn-apk { background: linear-gradient(135deg, var(--flutter-blue), var(--flutter-cyan)); color: white; }
        .btn-apk:hover { opacity: 0.9; }
        footer { text-align: center; margin-top: 60px; padding-top: 30px; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 13px; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo-hub">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14.2 2H21L14.4 8.6L21 15.2H14.2L7.6 8.6L14.2 2Z" fill="white"/><path d="M7.6 8.6L14.2 15.2H21L14.4 21.8H7.6L1 15.2L7.6 8.6Z" fill="#13B9FD"/></svg>
        </div>
        <h1>Flutter 作品流水线矩阵</h1>
        <p>基于 GitHub Actions 工业级 CI/CD 构建，实时扫描、编译并分发多端产物</p>
        <div class="stats-bar">
            <div class="stats-item">项目总数: <strong></strong></div>
            <div class="stats-item">|</div>
            <div class="stats-item">最后编译时间: <span></span></div>
        </div>
    </header>
    <div class="project-grid">
        </div>
    <footer><p>© 2026 Flutter Multi-Gallery Hub | Powered by Actions & Pages</p></footer>
</div>
</body>
</html>
