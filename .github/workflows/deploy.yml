name: Build & Multi-Project Gallery

on:
  push:
    branches: [ main ] # 当代码推送到 main 分支时自动触发

permissions:
  contents: write # 赋予流水线写入 gh-pages 分支的权限

jobs:
  build-matrix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 【核心修复点 1】彻底在全局物理删除旧的 build 缓存目录，防止残留
      - name: Hard Reset Build Directory
        run: |
          rm -rf build
          mkdir -p build/deploy_site/downloads
          mkdir -p build/deploy_site/web_subprojects

      # 【核心修复点 2】循环编译子项目
      - name: Loop and Build All Flutter Projects
        run: |
          for project in projects/*; do
            if [ -d "$project" ]; then
              p_name=$(basename "$project")
              echo "=========================================="
              echo "正在全自动化打包项目: $p_name"
              echo "=========================================="
              
              cd "$project"
              
              # 先把当前子项目彻底洗干净
              flutter clean
              flutter pub get
              
              # 1. 编译并精准移动 APK
              flutter build apk --release --target-platform android-arm64
              cp build/app/outputs/flutter-apk/app-release.apk ../../build/deploy_site/downloads/${p_name}-arm64.apk
              
              # 2. 编译并精准复制 Web
              # ⚠️ 请确保将下面的 YOUR_REPO_NAME 改为你真实的 GitHub 仓库名 fluttershow ⚠️
              flutter build web --release --base-href "/fluttershow/web_subprojects/${p_name}/"
              mkdir -p ../../build/deploy_site/web_subprojects/${p_name}
              cp -R build/web/. ../../build/deploy_site/web_subprojects/${p_name}/
              
              # 打扫子项目战场，不给下一个项目留垃圾
              flutter clean
              
              cd ../..
            fi
          done

      # 3. 调用 Python 脚本读取元数据，它会覆盖生成全新的、干净的 build/deploy_site/index.html
      - name: Generate Dynamic Showcase HTML
        run: python generate_gallery.py

      # 【验证步骤】在部署前，打印出 index.html 的实际大小，确保它绝不可能超过 100MB
      - name: Verify index.html size
        run: |
          echo "==== 检查最终 index.html 的大小 ===="
          ls -lh build/deploy_site/index.html
          echo "==================================="

      # 4. 部署到 GitHub Pages 分支
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/deploy_site
          branch: gh-pages
          clean: true