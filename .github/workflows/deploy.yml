name: Build & Multi-Project Gallery

on:
  push:
    branches: [ main ] # 当代码推送到 main 分支时自动触发

permissions:
  contents: write # 赋予流水线写入 gh-pages 分支的权限

jobs:
  build-matrix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 创建统一的发布产物收集箱
      - name: Initialize Deploy Directories
        run: |
          mkdir -p build/deploy_site/downloads
          mkdir -p build/deploy_site/web_subprojects

      # 【核心】循环编译 projects 目录下的所有子项目
      # 【彻底修复版】循环编译 projects 目录下的所有子项目
      - name: Loop and Build All Flutter Projects
        run: |
          for project in projects/*; do
            if [ -d "$project" ]; then
              p_name=$(basename "$project")
              echo "=========================================="
              echo "正在全自动化打包项目: $p_name"
              echo "=========================================="
              
              # 1. 补全依赖
              cd "$project"
              flutter pub get
              
              # 2. 编译 ARM64 APK
              flutter build apk --release --target-platform android-arm64
              # 精准复制 APK，确保它只去取绝对路径下的产物
              cp build/app/outputs/flutter-apk/app-release.apk ../../build/deploy_site/downloads/${p_name}-arm64.apk
              
              # 3. 编译 Web 网页（记得将下面的 YOUR_REPO_NAME 改为你真实的 GitHub 仓库名！）
              flutter build web --release --base-href "/YOUR_REPO_NAME/web_subprojects/${p_name}/"
              
              # 【核心修复点】创建专属的子项目网页目录，并“只”复制 build/web 下的内容
              mkdir -p ../../build/deploy_site/web_subprojects/${p_name}
              cp -R build/web/. ../../build/deploy_site/web_subprojects/${p_name}/
              
              # 4. 打扫战场：清理当前项目的 build 缓存，防止下一个项目循环时发生文件混淆
              flutter clean
              
              cd ../..
            fi
          done

      # 调用 Python 脚本读取元数据，动态渲染最终的 index.html
      - name: Generate Dynamic Showcase HTML
        run: python generate_gallery.py

      # 部署到 GitHub Pages 分支
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/deploy_site
          branch: gh-pages
          clean: true